services:
  - type: web
    name: thieu-nhi-thanh-the-backend
    runtime: node
    repo: https://github.com/LeHaiTho/backend-he-thong-quan-ly-thieu-nhi-thanh-the
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false # Render will generate this URL, which you can update later
      
      # Database connection (Enter your remote MySQL details on Render)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false

      # Security (Render will automatically generate a secure 32-character random string!)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
